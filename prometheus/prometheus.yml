global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'employee-gateway'
    static_configs:
      - targets: ['employee-gateway:8000']

  - job_name: 'user-gateway'
    static_configs:
      - targets: ['user-gateway:8000']

  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']