global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'admin-gateway'
    static_configs:
      - targets: ['admin-gateway:8000']

  - job_name: 'user-gateway'
    static_configs:
      - targets: ['user-gateway:8000']

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:8000']

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:8000']
