services:
  admin-gateway:
    build: ./admin-gateway
    env_file: .env
    depends_on: [inventory-service, order-service]

  user-gateway:
    build: ./user-gateway
    env_file: .env
    depends_on: [order-service]

  inventory-service:
    build: ./inventory-service
    env_file: .env

  order-service:
    build: ./order-service
    env_file: .env
    environment:
      - INVENTORY_URL=http://inventory-service:8000

  nginx:
    image: nginx:1.29.6-alpine
    ports: ["8080:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [admin-gateway, user-gateway]

  db:
    image: postgres:18.3-alpine
    env_file: .env
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v3
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:12.3
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  pgdata:
