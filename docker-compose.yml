services:
  admin-gateway:
    build: ./admin-gateway
    networks:
      - gateway
      - internal
    env_file: .env
    depends_on: [inventory-service, order-service]

  user-gateway:
    build: ./user-gateway
    networks:
      - gateway
      - internal
    env_file: .env
    depends_on: [inventory-service, order-service]

  inventory-service:
    build: ./inventory-service
    networks:
      - internal
    env_file: .env

  order-service:
    build: ./order-service
    networks:
      - internal
    env_file: .env

  nginx:
    image: nginx:1.29.6-alpine
    networks:
      - public
      - gateway
    ports: ["8080:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on: [admin-gateway, user-gateway, grafana, prometheus]

  db:
    build: ./db
    networks:
      - internal
    env_file: .env
    command: >
      -c shared_preload_libraries=pg_cron,http
      -c cron.database_name=${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/db_inits/pre-seed:/docker-entrypoint-initdb.d
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3
    networks:
      - gateway
      - internal
    # ports: ["9090:9090"]
    command:
       - '--config.file=/etc/prometheus/prometheus.yml' # TEMP: won't be accessable through nginx in the future (only through grafana)
       - --storage.tsdb.path=/prometheus
       - --web.console.templates=/etc/prometheus/consoles
       - --web.console.libraries=/etc/prometheus/console_libraries
       - '--web.external-url=https://localhost/prometheus/'
       - '--web.route-prefix=/'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on: [admin-gateway, user-gateway, inventory-service, order-service]

  grafana:
    image: grafana/grafana:12.3
    networks:
      - gateway
      - internal
    # ports: ["3000:3000"]
    env_file: .env
    depends_on: [prometheus]

volumes:
  postgres_data:

networks:
  public:
  gateway:
  internal:
